name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    steps:
      - name: Checkout SDK
        uses: actions/checkout@v4
        with:
          path: sdk-typescript

      - name: Checkout spec (sibling, for fixtures + test vectors)
        uses: actions/checkout@v4
        with:
          repository: openagp/spec
          path: spec

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: sdk-typescript/package-lock.json

      - name: Install
        working-directory: sdk-typescript
        run: npm ci

      - name: Verify bundled schemas are in sync with spec/schemas/
        working-directory: sdk-typescript
        run: |
          set -euo pipefail
          for f in ../spec/schemas/*.json; do
            name=$(basename "$f")
            if ! cmp -s "$f" "src/_schemas/$name"; then
              echo "::error file=src/_schemas/$name::out of sync with ../spec/schemas/$name — run scripts/sync-schemas.sh"
              exit 1
            fi
          done
          echo "all schemas in sync"

      - name: tsc (build + typecheck)
        working-directory: sdk-typescript
        run: npm run build

      - name: vitest
        working-directory: sdk-typescript
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm pack --dry-run
      - uses: actions/upload-artifact@v4
        with:
          name: tarball
          path: "*.tgz"
